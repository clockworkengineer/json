[package]
name = "json_lib"
version = "0.1.7"
edition = "2024"
description = "JSON library implementation."
license = "MIT"
authors = ["clockworkengineer <your-email@example.com>"]
repository = "https://github.com/clockworkengineer/json"
documentation = "https://github.com/clockworkengineer/json/tree/main/docs"
homepage = "https://github.com/clockworkengineer/json"
keywords = ["json", "serialization", "parser", "rust", "library"]
categories = ["encoding", "parser-implementations", "data-structures"]

[features]
default = ["std", "file-io"]
std = ["alloc", "rand?/std"]
alloc = []

# Optional I/O capabilities
file-io = ["std"]

# Optional format converters
format-bencode = []
format-yaml = []
format-xml = []
format-toml = []

# JSON Pointer support (RFC 6901)
json-pointer = []

[dependencies]
dtoa = "1.0.11"
itoa = "1.0.17"
rand = { version = "0.10.0", optional = true, default-features = false }
smallvec = "1.15.1"
