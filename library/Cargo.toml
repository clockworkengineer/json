[package]
name = "json_lib"
version = "0.1.7"
edition = "2024"
description = "JSON library implementation."
license = "MIT"

[features]
default = ["std", "file-io"]
std = ["alloc", "rand?/std"]
alloc = []

# Optional I/O capabilities
file-io = ["std"]

# Optional format converters
format-bencode = []
format-yaml = []
format-xml = []
format-toml = []

# JSON Pointer support (RFC 6901)
json-pointer = []

[dependencies]
rand = { version = "0.9.2", optional = true, default-features = false }
